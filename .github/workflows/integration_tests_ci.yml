name: Integration Tests CI

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  id-token: write
  contents: read
  pull-requests: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            should_run:
              - 'miner/**'
              - 'zk-pow/**'
              - 'plonky2/**'
              - '.github/workflows/integration_tests_ci.yml'
              - 'pyproject.toml'
              - 'uv.lock'

  start-runner:
    name: Start EC2 GPU Runner
    needs: detect-changes
    # Run on merge_group OR if paths changed in PR
    if: github.event_name == 'merge_group' || needs.detect-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start.outputs.label }}
      ec2-instance-id: ${{ steps.start.outputs.ec2-instance-id }}
    steps:
      - uses: actions/checkout@v6
      - id: start
        uses: ./.github/actions/start-ec2-runner
        with:
          aws-access-key-id: ${{ secrets.EC2_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.EC2_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.EC2_GPU_REGION }}
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ${{ vars.EC2_GPU_AMI_ID }}
          ec2-instance-type: ${{ vars.EC2_GPU_INSTANCE_TYPE }}
          subnet-id: ${{ vars.EC2_GPU_SUBNET_ID }}
          security-group-id: ${{ vars.EC2_GPU_SECURITY_GROUP_ID }}

  integration-tests:
    name: Integration Tests
    needs: [detect-changes, start-runner]
    if: always() && !cancelled() && (github.event_name == 'merge_group' || needs.detect-changes.outputs.should_run == 'true')
    runs-on: ${{ needs.start-runner.outputs.label || 'h100-gpu' }}
    timeout-minutes: 30
    container:
      image: public.ecr.aws/x5p2d7p8/pearl/ci-container:latest
      options: --gpus all --shm-size=16g --ipc=host

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1
          clean: true

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Fix Git ownership
        run: git config --global --add safe.directory /__w/pearl/pearl

      - name: Build pearld
        run: task build:blockchain

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install miner packages
        run: uv sync --package vllm-miner --package pearl-gemm --no-editable --refresh

      - name: Delete existing pearld data directory
        run: rm -rf /tmp/pearld_test

      - name: Start pearld node
        run: |
          echo "Starting pearld node in simnet mode..."
          ./bin/pearld \
            --simnet \
            --datadir=/tmp/pearld_test \
            --rpcuser=user \
            --rpcpass=pass \
            --rpclisten=0.0.0.0:44107 \
            --notls \
            --addrindex \
            --txindex \
            --miningaddr=rprl1p94k8ffwc4ufn78r9cz5ln8zrxjvdeqraecpzu4vuvz36wrszy04qtcg0d2 \
            --debuglevel=debug \
            > /tmp/pearld.log 2>&1 &

          echo "pearld started with PID: $!"
          echo "PEARLD_PID=$!" >> $GITHUB_ENV

          sleep 3

      - name: Check pearld logs before tests
        run: |
          echo "=== pearld logs before starting tests ==="
          tail -n 100 /tmp/pearld.log || echo "No log file"
          
          echo ""
          echo "=== pearld process check ==="
          ps aux | grep pearld | grep -v grep || echo "pearld not running!"

      - name: Run vLLM execution tests
        id: vllm_tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run pytest -v miner/vllm-miner/tests/test_vllm_execution.py \
            --basetemp=/tmp/pytest-vllm

      - name: Upload vLLM logs on failure
        if: failure() && steps.vllm_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vllm-integration-logs
          path: /tmp/pytest-vllm/
          if-no-files-found: warn

      - name: Run Integration tests
        run: |
          uv run pytest -v -m integration miner/

      - name: Cleanup pearld
        if: always()
        run: |
          if [ -n "$PEARLD_PID" ]; then
            echo "Stopping pearld (PID: $PEARLD_PID)..."
            kill $PEARLD_PID 2>/dev/null || true
          fi
          pkill -f pearld || true

  stop-runner:
    name: Stop EC2 GPU Runner
    needs: [start-runner, integration-tests]
    runs-on: ubuntu-latest
    if: always() && needs.start-runner.result != 'skipped'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.EC2_GPU_REGION }}
          aws-access-key-id: ${{ secrets.EC2_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.EC2_AWS_SECRET_ACCESS_KEY }}
      - name: Stop EC2 runner
        if: needs.start-runner.outputs.ec2-instance-id != ''
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}
      - name: Terminate orphan EC2 instance
        if: needs.start-runner.outputs.ec2-instance-id == ''
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:GitHubRunId,Values=${{ github.run_id }}" \
              "Name=instance-state-name,Values=running,pending,stopping" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          if [ -n "$INSTANCE_ID" ]; then
            echo "Found orphan EC2 instance: $INSTANCE_ID — terminating"
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID
          else
            echo "No orphan EC2 instance found for run ${{ github.run_id }}"
          fi

  # This job is what should be marked as required in branch protection
  integration-tests-status:
    name: Integration Tests Status
    runs-on: ubuntu-latest
    needs: [detect-changes, integration-tests]
    if: always()
    steps:
      - name: Check integration tests result
        run: |
          # Pass if tests were skipped (paths didn't match in PR) OR if tests succeeded
          if [ "${{ needs.integration-tests.result }}" == "skipped" ] || [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "Integration tests passed or were not required"
            exit 0
          else
            echo "Integration tests failed or were cancelled"
            exit 1
          fi
