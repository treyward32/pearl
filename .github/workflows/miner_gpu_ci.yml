name: Miner GPU CI on PRs

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  id-token: write
  contents: read
  pull-requests: read
  packages: read

concurrency:
  # Same group for all runs from the same workflow *and* PR number or branch ref
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.venv-gpu-ci

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            should_run:
              - 'miner/pearl-gemm/**'
              - 'miner/pearl-gemm-build-utils/**'
              - 'miner/vllm-miner/**'
              - 'miner/conftest.py'
              - 'miner/pytest.ini'
              - '.github/workflows/miner_gpu_ci.yml'
              - 'pyproject.toml'
              - 'uv.lock'

  start-runner:
    name: Start EC2 GPU Runner
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start.outputs.label }}
      ec2-instance-id: ${{ steps.start.outputs.ec2-instance-id }}
    steps:
      - uses: actions/checkout@v6
      - id: start
        uses: ./.github/actions/start-ec2-runner
        with:
          aws-access-key-id: ${{ secrets.EC2_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.EC2_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.EC2_GPU_REGION }}
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ${{ vars.EC2_GPU_AMI_ID }}
          ec2-instance-type: ${{ vars.EC2_GPU_INSTANCE_TYPE }}
          subnet-id: ${{ vars.EC2_GPU_SUBNET_ID }}
          security-group-id: ${{ vars.EC2_GPU_SECURITY_GROUP_ID }}

  gpu-ci:
    name: GPU CI
    needs: [detect-changes, start-runner]
    if: always() && !cancelled() && needs.detect-changes.outputs.should_run == 'true'
    runs-on: ${{ needs.start-runner.outputs.label || 'h100-gpu' }}
    container:
      image: public.ecr.aws/x5p2d7p8/pearl/ci-container:latest
      options: --gpus all --shm-size=16g --ipc=host

    steps:
    - name: Check out the repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Fix Git ownership
      run: git config --global --add safe.directory ${{ github.workspace }}

    - name: Install Rust stable toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install vllm-miner
      working-directory: miner/vllm-miner
      run: uv sync --package vllm-miner --package pearl-gemm --package pearl-gemm-build-utils --no-editable --refresh

    - name: Run GPU tests
      run: |
        uv run pytest -n auto -v -m "not integration" --ignore=miner/vllm-miner/tests/test_vllm_execution.py \
               miner/pearl-gemm/tests/ \
               miner/vllm-miner/tests/

  stop-runner:
    name: Stop EC2 GPU Runner
    needs: [start-runner, gpu-ci]
    runs-on: ubuntu-latest
    if: always() && needs.start-runner.result != 'skipped'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.EC2_GPU_REGION }}
          aws-access-key-id: ${{ secrets.EC2_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.EC2_AWS_SECRET_ACCESS_KEY }}
      - name: Stop EC2 runner
        if: needs.start-runner.outputs.ec2-instance-id != ''
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}
      - name: Terminate orphan EC2 instance
        if: needs.start-runner.outputs.ec2-instance-id == ''
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:GitHubRunId,Values=${{ github.run_id }}" \
              "Name=instance-state-name,Values=running,pending,stopping" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          if [ -n "$INSTANCE_ID" ]; then
            echo "Found orphan EC2 instance: $INSTANCE_ID — terminating"
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID
          else
            echo "No orphan EC2 instance found for run ${{ github.run_id }}"
          fi

  ci_status:
    name: Miner GPU CI Status
    runs-on: ubuntu-latest
    needs: [gpu-ci]
    if: always()
    steps:
      - run: |
          result="${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}"
          echo "Overall result: $result"
          [ "$result" = 'success' ]