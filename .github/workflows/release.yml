name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override (leave empty to extract from source)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Extract version
        id: version
        working-directory: node
        env:
          VERSION_OVERRIDE: ${{ inputs.version_override }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
          else
            echo 'package main; import "fmt"; func main() { fmt.Println(version()) }' > pv.go
            VERSION="v$(go run pv.go version.go)"
            rm pv.go
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: pearl-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact_name: pearl-linux-arm64
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            artifact_name: pearl-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: pearl-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: pearl-windows-amd64

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Add Rust GNU target (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu

      - name: Build with Task
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            export CARGO_BUILD_TARGET=x86_64-pc-windows-gnu
          fi
          task build:blockchain

      - name: Package binaries (Unix)
        if: matrix.goos != 'windows'
        run: |
          mkdir -p dist
          cp bin/pearld bin/prlctl bin/oyster dist/
          tar -czvf ${{ matrix.artifact_name }}-${{ env.VERSION }}.tar.gz -C dist .

      - name: Package binaries (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp bin/pearld.exe bin/prlctl.exe bin/oyster.exe dist/
          cd dist && 7z a ../${{ matrix.artifact_name }}-${{ env.VERSION }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-${{ env.VERSION }}.*

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
