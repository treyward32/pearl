name: Rust CI

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      pearl_blake3: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_blake3_src == 'true' }}
      zk_pow: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_blake3_src == 'true' || steps.filter.outputs.zk_pow_src == 'true' }}
      py_pearl_mining: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_blake3_src == 'true' || steps.filter.outputs.zk_pow_src == 'true' || steps.filter.outputs.py_pearl_mining_src == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            common:
              - '.github/workflows/rust_ci.yml'
            pearl_blake3_src:
              - 'pearl-blake3/**'
            zk_pow_src:
              - 'zk-pow/**'
              - 'plonky2/**'
            py_pearl_mining_src:
              - 'py-pearl-mining/**'

  pearl-blake3-tests:
    name: pearl-blake3 Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.pearl_blake3 == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pearl-blake3 -> target"
          cache-on-failure: true
      - name: Check formatting
        run: cargo fmt --all --check
        working-directory: pearl-blake3
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: pearl-blake3
      - name: Run tests
        run: cargo test
        working-directory: pearl-blake3

  zk-pow-tests:
    name: zk-pow Complete Test Suite
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.zk_pow == 'true' }}
    defaults:
      run:
        working-directory: zk-pow
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "zk-pow -> target"
          cache-on-failure: true

      - name: Install system dependencies (jemalloc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libjemalloc-dev

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build project and generate verifier cache
        run: |
          cargo build --release
          cargo run --release --bin build_cache src/circuit/cache.bin
          cargo build --release --features embedded_cache
        env:
          RUSTFLAGS: -Copt-level=3 -Cdebug-assertions -Coverflow-checks=y -Cdebuginfo=0

      - name: Run tests
        run: cargo test --release --features embedded_cache
        env:
          RUSTFLAGS: -Copt-level=3 -Cdebug-assertions -Coverflow-checks=y -Cdebuginfo=0

      - name: Test binaries
        run: cargo test --bins --release --features embedded_cache

      - name: Run doc tests
        run: cargo test --doc --release --features embedded_cache

      - name: Test layout-macro
        run: |
          if [ -d "src/circuit/layout_macro" ]; then
            cd src/circuit/layout_macro && cargo test --release
          fi

      - name: Test invalid proofs mode
        run: cargo run --release --bin prove_verify -- invalid

      - name: Test performance mode
        run: cargo run --release --bin prove_verify -- performance

      # Go FFI Build
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Regenerate verifier circuit cache for Go FFI
        run: |
          cargo run --release --bin build_cache src/circuit/cache.bin
        env:
          RUSTFLAGS: -C target-cpu=native

      - name: Build zk_pow_ffi library for Go FFI
        run: |
          cd bindings/go
          cargo build --release

  py-pearl-mining-tests:
    name: py-pearl-mining Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.py_pearl_mining == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "py-pearl-mining -> target"
          cache-on-failure: true
      - uses: astral-sh/setup-uv@v6
      - name: Install system dependencies (jemalloc)
        run: |
          sudo apt-get update
          sudo apt-get install -y libjemalloc-dev
      - name: Install package
        run: uv sync --package py-pearl-mining --no-editable
      - name: Run tests
        run: uv run pytest py-pearl-mining/tests/

  ci_status:
    name: Rust CI Status
    runs-on: ubuntu-latest
    needs: [pearl-blake3-tests, zk-pow-tests, py-pearl-mining-tests]
    if: always()
    steps:
      - run: |
          result="${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}"
          echo "Overall result: $result"
          [ "$result" = 'success' ]
