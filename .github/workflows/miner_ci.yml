name: "Miner CI: Lint & Unit Tests"

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      pearl_gateway: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' }}
      miner_base: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' || steps.filter.outputs.miner_base_src == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            common:
              - '.github/workflows/miner_ci.yml'
              - 'miner/conftest.py'
              - 'miner/miner-utils/**'
              - 'pearl-blake3/**'
              - 'zk-pow/**'
              - 'py-pearl-mining/**'
              - 'pyproject.toml'
              - 'uv.lock'
            pearl_gateway_src:
              - 'miner/pearl-gateway/**'
            miner_base_src:
              - 'miner/miner-base/**'

  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Check Python formatting with Ruff
        run: |
          PY_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- '*.py')
          if [ -n "$PY_FILES" ]; then
            echo "Checking Python files:"
            echo "$PY_FILES"
            echo "$PY_FILES" | xargs uvx ruff check
            echo "$PY_FILES" | xargs uvx ruff format --check --diff
          else
            echo "No Python files changed"
          fi
      - name: Check C++/CUDA formatting with clang-format
        run: |
          CPP_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- '*.cpp' '*.hpp' '*.h' '*.cu' '*.cuh' | grep -v 'third_party/' || true)
          if [ -n "$CPP_FILES" ]; then
            echo "Checking C++/CUDA formatting for:"
            echo "$CPP_FILES"
            echo "$CPP_FILES" | xargs clang-format --dry-run --Werror
          else
            echo "No C++/CUDA files changed"
          fi

  pearl_gateway:
    name: Pearl Gateway
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.pearl_gateway == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Install dependencies
        run: uv sync --package pearl-gateway --no-editable
      - name: Test with pytest
        run: uv run pytest -n auto -m "not integration and not performance and not slow" miner/pearl-gateway

  miner_base:
    name: Miner Base
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.miner_base == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Install dependencies
        run: uv sync --package miner-base --no-editable
      - name: Test with pytest
        run: uv run pytest -n auto --max-worker-restart=3 -m "not integration and not slow" miner/miner-base

  ci_status:
    name: Miner CI Status
    runs-on: ubuntu-latest
    needs: [formatting, pearl_gateway, miner_base]
    if: always()
    steps:
      - run: |
          result="${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}"
          echo "Overall result: $result"
          [ "$result" = 'success' ]
