name: miner CI

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  # Same group for all runs from the same workflow *and* PR number or branch ref
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      pearl_gateway: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' }}
      miner_base: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' || steps.filter.outputs.miner_base_src == 'true' }}
      vllm_miner: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' || steps.filter.outputs.miner_base_src == 'true' || steps.filter.outputs.vllm_miner_src == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            common:
              - '.github/workflows/miner_ci.yml'
              - 'miner/conftest.py'
              - 'miner/miner-utils/**'
              - 'pearl-blake3/**'
              - 'zk-pow/**'
              - 'py-pearl-mining/**'
              - 'pyproject.toml'
              - 'uv.lock'
            pearl_gateway_src:
              - 'miner/pearl-gateway/**'
            miner_base_src:
              - 'miner/miner-base/**'
            vllm_miner_src:
              - 'miner/vllm-miner/**'

  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - name: Check Python formatting with Ruff
        run: |
          PY_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- '*.py')
          if [ -n "$PY_FILES" ]; then
            echo "Checking Python files:"
            echo "$PY_FILES"
            echo "$PY_FILES" | xargs uvx ruff check
            echo "$PY_FILES" | xargs uvx ruff format --check --diff
          else
            echo "No Python files changed"
          fi
      - name: Check C++/CUDA formatting with clang-format
        run: |
          CPP_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA"...HEAD -- '*.cpp' '*.hpp' '*.h' '*.cu' '*.cuh' | grep -v 'third_party/' || true)
          if [ -n "$CPP_FILES" ]; then
            echo "Checking C++/CUDA formatting for:"
            echo "$CPP_FILES"
            echo "$CPP_FILES" | xargs clang-format --dry-run --Werror
          else
            echo "No C++/CUDA files changed"
          fi

  pearl_gateway:
    name: Pearl Gateway
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.pearl_gateway == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --package pearl-gateway --no-editable
      - name: Test with pytest
        run: uv run pytest -n auto -m "not integration and not performance and not slow" miner/pearl-gateway

  miner_base:
    name: Miner Base
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.miner_base == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --package miner-base --no-editable
      - name: Test with pytest
        run: uv run pytest -n auto --max-worker-restart=3 -m "not integration and not slow" miner/miner-base

  performance_tests:
    name: Pearl Gateway Performance Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'merge_group' && needs.detect-changes.outputs.pearl_gateway == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --package pearl-gateway --no-editable
      - name: Run performance tests
        run: uv run pytest -m performance miner/pearl-gateway

  vllm_miner_docker_test:
    name: Test Building Docker image (vLLM miner)
    needs: detect-changes
    if: ${{ github.event_name == 'merge_group' && needs.detect-changes.outputs.vllm_miner == 'true' }}
    runs-on: large-runner
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./miner/vllm-miner/Dockerfile
          push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ci_status:
    name: Miner CI Status
    runs-on: ubuntu-latest
    needs: [formatting, pearl_gateway, miner_base, performance_tests, vllm_miner_docker_test]
    if: always()
    steps:
      - run: |
          result="${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}"
          echo "Overall result: $result"
          [ "$result" = 'success' ]
