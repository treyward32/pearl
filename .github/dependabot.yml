version: 2
updates:
  # --- GitHub Actions (weekly - high-value, low-noise) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- Go modules ---
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "gomod"
    directory: "/proxy/caddy-jsonrpc-cache"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- Rust / Cargo ---
  - package-ecosystem: "cargo"
    directory: "/zk-pow"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/pearl-blake3"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/plonky2"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "cargo"
    directory: "/py-pearl-mining"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- Node / pnpm ---
  - package-ecosystem: "npm"
    directory: "/apps"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- Python (uv) ---
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- Docker (key services only) ---
  - package-ecosystem: "docker"
    directory: "/node"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]

  - package-ecosystem: "docker"
    directory: "/wallet"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]

  - package-ecosystem: "docker"
    directory: "/miner/vllm-miner"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
