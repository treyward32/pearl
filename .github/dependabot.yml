version: 2
updates:
  # --- GitHub Actions (weekly - high-value, low-noise) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "ci"]
    groups:
      all-actions:
        patterns:
          - "*"

  # --- Go modules (single PR for all Go directories) ---
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/tools"
      - "/proxy/caddy-jsonrpc-cache"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      all-go:
        patterns:
          - "*"

  # --- Rust / Cargo (single PR for all Cargo directories) ---
  - package-ecosystem: "cargo"
    directories:
      - "/zk-pow"
      - "/pearl-blake3"
      - "/plonky2"
      - "/py-pearl-mining"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      all-rust:
        patterns:
          - "*"

  # --- Node / pnpm ---
  - package-ecosystem: "npm"
    directory: "/apps"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      all-node:
        patterns:
          - "*"

  # --- Python (uv) ---
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    groups:
      all-python:
        patterns:
          - "*"

  # --- Docker (single PR for all Dockerfiles) ---
  - package-ecosystem: "docker"
    directories:
      - "/node"
      - "/wallet"
      - "/miner/vllm-miner"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    groups:
      all-docker:
        patterns:
          - "*"
